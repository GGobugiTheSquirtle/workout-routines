<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>맨몸운동</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

<style>
/* ==========================================================================
   VARIABLES
   ========================================================================== */

:root {
  /* Colors — Light */
  --bg-primary: #FAFAFA;
  --bg-secondary: #FFFFFF;
  --bg-tertiary: #F5F5F5;
  --text-primary: #1A1A1A;
  --text-secondary: #6B6B6B;
  --text-tertiary: #9E9E9E;
  --accent: #4F46E5;
  --accent-soft: #EEF2FF;
  --success: #059669;
  --success-soft: #ECFDF5;
  --warning: #D97706;
  --border: #E5E5E5;
  --border-subtle: #F0F0F0;

  /* Spacing — 4px grid */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-7: 28px;
  --space-8: 32px;
  --space-9: 36px;
  --space-10: 40px;
  --space-11: 44px;
  --space-12: 48px;

  /* Typography */
  --font-sans: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --leading-tight: 1.25;
  --leading-normal: 1.5;

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.08);

  /* Transitions */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;

  /* Layout */
  --tab-height: 64px;
}

/* ==========================================================================
   DARK MODE
   ========================================================================== */

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #0A0A0A;
    --bg-secondary: #141414;
    --bg-tertiary: #1C1C1C;
    --text-primary: #F5F5F5;
    --text-secondary: #A0A0A0;
    --text-tertiary: #666666;
    --accent: #818CF8;
    --accent-soft: #1E1B4B;
    --success: #34D399;
    --success-soft: #064E3B;
    --warning: #FBBF24;
    --border: #2A2A2A;
    --border-subtle: #1F1F1F;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
    --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3);
    --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.4);
  }
}

/* ==========================================================================
   RESET / BASE
   ========================================================================== */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-family: var(--font-sans);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

body {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100dvh;
  min-height: 100vh; /* fallback */
  overflow-x: hidden;
  line-height: var(--leading-normal);
}

/* Thin scrollbar — Webkit */
::-webkit-scrollbar {
  width: 4px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: var(--radius-full);
}

/* ==========================================================================
   LAYOUT
   ========================================================================== */

#app {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  min-height: 100vh; /* fallback */
}

#app-header {
  padding: var(--space-5) var(--space-5) var(--space-2);
  position: sticky;
  top: 0;
  background-color: var(--bg-primary);
  z-index: 10;
}

.app-title {
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.02em;
  line-height: var(--leading-tight);
  color: var(--text-primary);
}

#main {
  flex: 1;
  padding: var(--space-4) var(--space-5);
  padding-bottom: calc(var(--tab-height) + var(--space-4) + env(safe-area-inset-bottom, 0px));
}

/* ==========================================================================
   TAB CONTENT
   ========================================================================== */

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
  animation: fadeIn var(--duration-normal) var(--ease-out);
}

/* ==========================================================================
   TAB BAR
   ========================================================================== */

#tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  height: var(--tab-height);
  background-color: var(--bg-secondary);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  z-index: 100;
}

.tab-btn {
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: var(--space-2);
  color: var(--text-tertiary);
  font-family: var(--font-sans);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  min-width: 64px;
  min-height: 44px;
  cursor: pointer;
  transition: color var(--duration-fast) var(--ease-out);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.tab-btn:active {
  transform: scale(0.95);
}

.tab-btn.active {
  color: var(--accent);
}

.tab-btn svg {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}

/* ==========================================================================
   LOADING
   ========================================================================== */

#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: 100dvh;
  gap: var(--space-4);
  color: var(--text-secondary);
  font-size: var(--text-sm);
}

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* ==========================================================================
   SETUP
   ========================================================================== */

.setup-card {
  max-width: 400px;
  margin: var(--space-12) auto;
  padding: var(--space-6);
  background-color: var(--bg-secondary);
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
}

.setup-card input {
  display: block;
  width: 100%;
  padding: var(--space-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background-color: var(--bg-tertiary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  outline: none;
  transition: border-color var(--duration-fast) var(--ease-out);
}

.setup-card input:focus {
  border-color: var(--accent);
}

.setup-card input::placeholder {
  color: var(--text-tertiary);
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-3) var(--space-4);
  background-color: var(--accent);
  color: #FFFFFF;
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  min-height: 48px;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: opacity var(--duration-fast) var(--ease-out),
              transform var(--duration-fast) var(--ease-out);
  -webkit-tap-highlight-color: transparent;
}

.btn-primary:active {
  opacity: 0.85;
  transform: scale(0.98);
}

/* ==========================================================================
   ANIMATIONS
   ========================================================================== */

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(4px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

/* ==========================================================================
   RESPONSIVE
   ========================================================================== */

@media (min-width: 700px) {
  #main {
    max-width: 500px;
    margin: 0 auto;
  }
}

/* ==========================================================================
   TAB-SPECIFIC STYLES (Tasks 5-8 will add here)
   ========================================================================== */

/* --- Today Tab (Task 5) --- # 2026-04-04 */

.today-header {
  padding: var(--space-4) var(--space-5);
}

.today-header h2 {
  font-size: var(--text-xl);
  font-weight: var(--weight-bold);
}

.today-header .day-meta {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  margin-top: var(--space-1);
}

.workout-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
  padding: 0 var(--space-4) var(--space-4);
}

.workout-card {
  background-color: var(--bg-secondary);
  border: 1.5px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  transition: all var(--duration-normal) var(--ease-out);
}

.workout-card.is-current {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.workout-card.is-done {
  opacity: 0.5;
}

.workout-card.is-pending {
  opacity: 0.7;
}

.workout-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-2);
}

.workout-name {
  font-size: var(--text-base);
  font-weight: var(--weight-semibold);
  color: var(--text-primary);
  cursor: pointer;
}

.workout-name:active {
  color: var(--accent);
}

.now-badge {
  font-size: var(--text-xs);
  font-weight: var(--weight-bold);
  color: var(--accent);
  background-color: var(--accent-soft);
  padding: 2px 8px;
  border-radius: var(--radius-full);
}

.workout-meta {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  margin-bottom: var(--space-3);
}

.set-indicators {
  display: flex;
  gap: var(--space-2);
  align-items: center;
  margin-bottom: var(--space-3);
}

.set-dot {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-full);
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-xs);
  color: var(--text-tertiary);
  transition: all var(--duration-fast) var(--ease-out);
}

.set-dot.done {
  background-color: var(--success);
  border-color: var(--success);
  color: #FFFFFF;
}

.set-progress-text {
  font-size: var(--text-xs);
  color: var(--text-tertiary);
  margin-left: auto;
}

.btn-complete {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  border: none;
  border-radius: var(--radius-md);
  background-color: var(--accent);
  color: #FFFFFF;
  font-size: var(--text-base);
  font-weight: var(--weight-semibold);
  cursor: pointer;
  min-height: 48px;
  font-family: var(--font-sans);
}

.btn-complete:active {
  transform: scale(0.97);
}

.btn-complete:disabled {
  background-color: var(--border);
  color: var(--text-tertiary);
  cursor: default;
}

.btn-complete.all-done {
  background-color: var(--success);
}

.note-input {
  width: 100%;
  margin-top: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background-color: var(--bg-tertiary);
  color: var(--text-primary);
  font-size: var(--text-sm);
  font-family: var(--font-sans);
  resize: none;
}

.note-input:focus {
  border-color: var(--accent);
  outline: none;
}

.rest-day {
  text-align: center;
  padding: var(--space-12) var(--space-6);
  color: var(--text-secondary);
}

.rest-day h2 {
  font-size: var(--text-2xl);
  margin-bottom: var(--space-4);
  color: var(--text-primary);
}

.complete-banner {
  text-align: center;
  padding: var(--space-6);
  background-color: var(--success-soft);
  border-radius: var(--radius-lg);
  margin: var(--space-4);
}

.complete-banner h3 {
  color: var(--success);
  font-size: var(--text-lg);
}

</style>
</head>
<body>

<!-- ======================================================================
     LOADING OVERLAY
     ====================================================================== -->
<div id="loading">

  <p>데이터 불러오는 중...</p>
</div>

<!-- ======================================================================
     MAIN APP (hidden initially)
     ====================================================================== -->
<div id="app" style="display:none">

  <header id="app-header">

<!-- ======================================================================
     JAVASCRIPT
     ====================================================================== -->
<script>
/* ==========================================================================
   STATE
   ========================================================================== */

const state = {
  exercises: [],
  todayProgram: [],
  config: {},
  logs: [],
  programs: [],
  today: '',
  activeTab: 'today',
  sessionProgress: {},
  exerciseMap: {},
  guideFilter: '전체',
  guideScrollTo: null,
  recordsMonth: null,
  recordsDate: null
};

/* ==========================================================================
   API CLIENT
   ========================================================================== */

const API_URL = localStorage.getItem('sheets_url') || '';

const api = {
  async init() {
    const res = await fetch(API_URL + '?action=init');
    return res.json();
  },
  async getPrograms(month) {
    const res = await fetch(API_URL + '?action=programs&month=' + month);
    return res.json();
  },
  async getLogs(month) {
    const res = await fetch(API_URL + '?action=logs&month=' + month);
    return res.json();
  },
  async getExercises() {
    const res = await fetch(API_URL + '?action=exercises');
    return res.json();
  },
  async postLog(data) {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'log', ...data })
    });
    return res.json();
  },
  async postConfig(key, value) {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'config', key, value })
    });
    return res.json();
  }
};

/* ==========================================================================
   TAB ROUTER
   ========================================================================== */

function switchTab(tabName) {
  state.activeTab = tabName;
  document.querySelectorAll('.tab-content').forEach(function(el) {
    el.classList.remove('active');
  });
  document.querySelectorAll('.tab-btn').forEach(function(el) {
    el.classList.remove('active');
  });
  document.getElementById('tab-' + tabName).classList.add('active');
  document.querySelector('[data-tab="' + tabName + '"]').classList.add('active');
  window.location.hash = '/' + tabName;
  renderTab(tabName);
}

document.getElementById('tab-bar').addEventListener('click', function(e) {
  var btn = e.target.closest('.tab-btn');
  if (btn) switchTab(btn.dataset.tab);
});

function handleHash() {
  var hash = window.location.hash.replace('#/', '') || 'today';
  if (['today', 'curriculum', 'records', 'guide'].includes(hash)) {
    switchTab(hash);
  }
}

window.addEventListener('hashchange', handleHash);

function renderTab(name) {
  switch (name) {
    case 'today': renderToday(); break;
    case 'curriculum': renderCurriculum(); break;
    case 'records': renderRecords(); break;
    case 'guide': renderGuide(); break;
  }
}

/* ==========================================================================
   RENDERERS (Tasks 5-8 will replace these)
   ========================================================================== */

function renderToday() {
  var container = document.getElementById('tab-today');
  var program = state.todayProgram;

  // Rest day check
  if (!program || program.length === 0) {
    container.innerHTML = '<div class="rest-day"><h2>오늘은 휴식일</h2><p>충분히 쉬세요. 회복도 성장의 일부입니다.</p></div>';
    return;
  }

  var dayLabel = program[0].day_label || '';
  var dateStr = formatDateKR(state.today);

  // All done check
  var allDone = program.every(function(p) {
    var prog = state.sessionProgress[p.exercise_id];
    return prog && prog.every(Boolean);
  });

  var html = '<div class="today-header"><h2>' + dayLabel + '</h2>';
  html += '<div class="day-meta">Level ' + (state.config.current_level || 1) + ' · ' + dateStr + '</div></div>';

  if (allDone) {
    html += '<div class="complete-banner"><h3>오늘 운동 완료!</h3><p>수고했어요. 기록이 저장되었습니다.</p></div>';
  }

  html += '<div class="workout-list">';

  // Find current exercise (first with incomplete sets)
  var currentIdx = program.findIndex(function(p) {
    var prog = state.sessionProgress[p.exercise_id];
    return prog && prog.some(function(s) { return !s; });
  });

  program.forEach(function(p, idx) {
    var ex = state.exerciseMap[p.exercise_id] || {};
    var progress = state.sessionProgress[p.exercise_id] || [];
    var doneCount = progress.filter(Boolean).length;
    var totalSets = progress.length;
    var isDone = doneCount === totalSets;
    var isCurrent = idx === currentIdx;
    var statusClass = isDone ? 'is-done' : isCurrent ? 'is-current' : 'is-pending';

    html += '<div class="workout-card ' + statusClass + '">';
    html += '<div class="workout-card-header">';
    html += '<span class="workout-name" onclick="navigateToGuide(\'' + p.exercise_id + '\')">' + (idx + 1) + '. ' + (ex.name || p.exercise_id) + '</span>';
    if (isCurrent) html += '<span class="now-badge">NOW</span>';
    if (isDone) html += '<span class="now-badge" style="background:var(--success-soft);color:var(--success)">DONE</span>';
    html += '</div>';
    html += '<div class="workout-meta">' + p.sets + '×' + p.reps + ' · ' + (ex.muscles_primary || '') + '</div>';

    // Set indicators
    html += '<div class="set-indicators">';
    progress.forEach(function(done, si) {
      html += '<div class="set-dot ' + (done ? 'done' : '') + '">' + (done ? '✓' : (si + 1)) + '</div>';
    });
    html += '<span class="set-progress-text">' + doneCount + '/' + totalSets + '</span></div>';

    // Complete button + note (only for current exercise)
    if (isCurrent) {
      html += '<button class="btn-complete" onclick="completeSet(\'' + p.exercise_id + '\')">세트 ' + (doneCount + 1) + ' 완료</button>';
      html += '<textarea class="note-input" placeholder="메모 (선택)" rows="1" id="note-' + p.exercise_id + '"></textarea>';
    }

    html += '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

// # 2026-04-04
async function completeSet(exerciseId) {
  var progress = state.sessionProgress[exerciseId];
  var setIdx = progress.findIndex(function(s) { return !s; });
  if (setIdx === -1) return;

  progress[setIdx] = true;

  var noteEl = document.getElementById('note-' + exerciseId);
  var note = noteEl ? noteEl.value.trim() : '';

  // POST to Sheets (fire and forget, don't block UI)
  api.postLog({
    date: state.today,
    exercise_id: exerciseId,
    set_number: setIdx + 1,
    reps_done: (state.todayProgram.find(function(p) { return p.exercise_id === exerciseId; }) || {}).reps || '',
    note: note
  }).catch(function(err) { console.error('Log post failed:', err); });

  renderToday();
}

/* ==========================================================================
   UTILITIES
   ========================================================================== */

function formatDateKR(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  var days = ['일', '월', '화', '수', '목', '금', '토'];
  return (d.getMonth() + 1) + '월 ' + d.getDate() + '일 ' + days[d.getDay()] + '요일';
}

/* ==========================================================================
   APP INIT
   ========================================================================== */

async function initApp() {
  try {
    if (!API_URL) {
      showSetup();
      return;
    }

    var data = await api.init();
    if (data.error) throw new Error(data.error);

    Object.assign(state, data);

    // Build exercise lookup map
    state.exerciseMap = {};
    state.exercises.forEach(function(ex) {
      state.exerciseMap[ex.id] = ex;
    });

    // Initialize session progress for today's program
    state.todayProgram.forEach(function(p) {
      state.sessionProgress[p.exercise_id] = new Array(Number(p.sets)).fill(false);
    });

    // Load full month data
    var month = state.today.substring(0, 7);
    var results = await Promise.all([
      api.getLogs(month),
      api.getPrograms(month)
    ]);
    var logsData = results[0];
    var programsData = results[1];

    if (logsData.logs) state.logs = logsData.logs;
    if (programsData.programs) state.programs = programsData.programs;

    // Show app
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = '';
    handleHash();

  } catch (err) {
    // NOTE: innerHTML used here with static markup + err.message from fetch API.
    // This is a single-user personal tool; data source is trusted (user's own Sheets).
    var el = document.getElementById('loading');
    el.textContent = '';
    var p = document.createElement('p');
    p.style.color = 'var(--warning)';
    p.textContent = '연결 실패: ' + err.message;
    el.appendChild(p);
    var btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.style.marginTop = 'var(--space-4)';
    btn.textContent = '설정';
    btn.onclick = showSetup;
    el.appendChild(btn);
  }
}

function showSetup() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = '';
  var main = document.getElementById('main');
  // Build setup card with DOM API for safety
  main.textContent = '';
  var card = document.createElement('div');
  card.className = 'setup-card';

  var h2 = document.createElement('h2');
  h2.style.cssText = 'font-size:var(--text-xl);font-weight:var(--weight-bold);margin-bottom:var(--space-3)';
  h2.textContent = '초기 설정';
  card.appendChild(h2);

  var desc = document.createElement('p');
  desc.style.cssText = 'color:var(--text-secondary);margin-bottom:var(--space-4)';
  desc.textContent = 'Google Apps Script 웹앱 URL을 입력하세요.';
  card.appendChild(desc);

  var input = document.createElement('input');
  input.type = 'url';
  input.id = 'setup-url';
  input.placeholder = 'https://script.google.com/...';
  input.style.fontFamily = 'var(--font-sans)';
  card.appendChild(input);

  var btn = document.createElement('button');
  btn.className = 'btn-primary';
  btn.style.cssText = 'margin-top:var(--space-4);width:100%';
  btn.textContent = '저장';
  btn.onclick = saveSetup;
  card.appendChild(btn);

  main.appendChild(card);
}

function saveSetup() {
  var url = document.getElementById('setup-url').value.trim();
  if (url) {
    localStorage.setItem('sheets_url', url);
    location.reload();
  }
}

// Start the app // 2026-04-04
initApp();
</script>
