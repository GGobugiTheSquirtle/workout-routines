<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>맨몸운동</title>
  <meta name="description" content="맨몸운동 루틴 관리 앱">
  <meta name="theme-color" content="#FAFAFA" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#09090B" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

<style>
/* ==========================================================================
   VARIABLES — Refined Zinc/Blue Palette
   2026-04-06 — Palette upgrade: warm orange → clean blue, zinc neutrals
   ========================================================================== */

:root {
  /* Colors — Light (clean zinc undertone) */
  --bg-primary: #FAFAFA;
  --bg-secondary: #FFFFFF;
  --bg-tertiary: #F4F4F5;
  --text-primary: #18181B;
  --text-secondary: #71717A;
  --text-tertiary: #A1A1AA;
  --accent: #2563EB;
  --accent-hover: #1D4ED8;
  --accent-soft: #EFF6FF;
  --accent-muted: rgba(37, 99, 235, 0.10);
  --success: #059669;
  --success-soft: #ECFDF5;
  --warning: #D97706;
  --warning-soft: #FFFBEB;
  --border: #E4E4E7;
  --border-subtle: #F4F4F5;

  /* Shadows — zinc-tinted */
  --shadow-xs: 0 1px 2px rgba(24, 24, 27, 0.03);
  --shadow-sm: 0 1px 3px rgba(24, 24, 27, 0.04), 0 1px 2px rgba(24, 24, 27, 0.02);
  --shadow-md: 0 4px 12px rgba(24, 24, 27, 0.05), 0 2px 4px rgba(24, 24, 27, 0.03);
  --shadow-lg: 0 8px 24px rgba(24, 24, 27, 0.07), 0 4px 8px rgba(24, 24, 27, 0.03);
  --shadow-xl: 0 16px 40px rgba(24, 24, 27, 0.09), 0 6px 12px rgba(24, 24, 27, 0.04);

  /* Spacing — 4px grid */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-7: 28px;
  --space-8: 32px;
  --space-9: 36px;
  --space-10: 40px;
  --space-11: 44px;
  --space-12: 48px;
  --space-16: 64px;

  /* Typography */
  --font-sans: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.9375rem;
  --text-lg: 1.0625rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;
  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --weight-extrabold: 800;
  --leading-tight: 1.2;
  --leading-snug: 1.35;
  --leading-normal: 1.55;

  /* Radius */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* Transitions */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration-fast: 150ms;
  --duration-normal: 200ms;
  --duration-slow: 350ms;

  /* Layout */
  --tab-height: 68px;

  /* Glass */
  --glass-bg: rgba(250, 250, 250, 0.85);
  --glass-border: rgba(228, 228, 231, 0.6);
  --glass-blur: 16px;
}

/* ==========================================================================
   DARK MODE — Zinc dark
   2026-04-06 — Warm stone → zinc-950/900/800
   ========================================================================== */

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #09090B;
    --bg-secondary: #18181B;
    --bg-tertiary: #27272A;
    --text-primary: #FAFAFA;
    --text-secondary: #A1A1AA;
    --text-tertiary: #52525B;
    --accent: #3B82F6;
    --accent-hover: #2563EB;
    --accent-soft: #1E293B;
    --accent-muted: rgba(59, 130, 246, 0.15);
    --success: #34D399;
    --success-soft: #052E16;
    --warning: #FBBF24;
    --warning-soft: #422006;
    --border: #27272A;
    --border-subtle: #1F1F23;

    --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.18);
    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.22), 0 1px 2px rgba(0, 0, 0, 0.16);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.28), 0 2px 4px rgba(0, 0, 0, 0.18);
    --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.32), 0 4px 8px rgba(0, 0, 0, 0.22);
    --shadow-xl: 0 16px 40px rgba(0, 0, 0, 0.38), 0 6px 12px rgba(0, 0, 0, 0.24);

    --glass-bg: rgba(9, 9, 11, 0.85);
    --glass-border: rgba(255, 255, 255, 0.06);
    --glass-blur: 16px;
  }
}

/* ==========================================================================
   RESET / BASE
   ========================================================================== */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-family: var(--font-sans);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  scroll-behavior: smooth;
}

body {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100dvh;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: var(--leading-normal);
  letter-spacing: -0.01em;
}

/* Thin scrollbar — Webkit */
::-webkit-scrollbar {
  width: 4px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: var(--radius-full);
}

/* ==========================================================================
   GRAIN OVERLAY — Premium texture
   ========================================================================== */

.grain-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.015;
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
}

@media (prefers-color-scheme: dark) {
  .grain-overlay {
    opacity: 0.015;
    mix-blend-mode: screen;
  }
}

/* ==========================================================================
   LAYOUT
   ========================================================================== */

#app {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  min-height: 100vh;
}

#app-header {
  padding: var(--space-6) var(--space-6) var(--space-3);
  position: sticky;
  top: 0;
  background-color: var(--bg-primary);
  z-index: 10;
  transition: box-shadow var(--duration-normal) var(--ease-out);
}

.app-title {
  font-size: var(--text-3xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.035em;
  line-height: var(--leading-tight);
  color: var(--text-primary);
}

.header-subtitle {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  margin-top: var(--space-1);
  letter-spacing: 0;
}

#main {
  flex: 1;
  padding: var(--space-2) var(--space-5) var(--space-4);
  padding-bottom: calc(var(--tab-height) + var(--space-6) + env(safe-area-inset-bottom, 0px));
}

/* ==========================================================================
   TAB CONTENT — Slide transitions
   ========================================================================== */

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
  animation: tabSlideIn var(--duration-slow) var(--ease-out);
}

/* ==========================================================================
   TAB BAR — Glassmorphism
   ========================================================================== */

#tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  height: var(--tab-height);
  background: var(--glass-bg);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(150%);
  backdrop-filter: blur(var(--glass-blur)) saturate(150%);
  border-top: 1px solid var(--glass-border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  z-index: 100;
}

.tab-btn {
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: var(--space-2);
  color: var(--text-tertiary);
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: var(--weight-semibold);
  letter-spacing: 0.02em;
  min-width: 64px;
  min-height: 48px;
  cursor: pointer;
  position: relative;
  transition: color var(--duration-normal) var(--ease-out),
              transform var(--duration-fast) var(--ease-out);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.tab-btn:active {
  transform: scale(0.92);
}

.tab-btn.active {
  color: var(--accent);
}

/* Active tab indicator — small dot under icon */
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  border-radius: var(--radius-full);
  background-color: var(--accent);
  animation: dotPop var(--duration-normal) var(--ease-spring);
}

.tab-btn svg {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  transition: transform var(--duration-normal) var(--ease-out);
}

.tab-btn.active svg {
  transform: scale(1.08);
}

/* Desktop hover for tab buttons */
@media (hover: hover) {
  .tab-btn:hover {
    color: var(--text-primary);
  }
}

/* ==========================================================================
   LOADING — Skeleton-style branded
   ========================================================================== */

#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: 100dvh;
  gap: var(--space-5);
  color: var(--text-secondary);
  font-size: var(--text-sm);
}

.spinner {
  width: var(--space-10);
  height: var(--space-10);
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s cubic-bezier(0.5, 0, 0.5, 1) infinite;
}

/* ==========================================================================
   SETUP
   ========================================================================== */

.setup-card {
  max-width: 400px;
  margin: var(--space-16) auto;
  padding: var(--space-8);
  background-color: var(--bg-secondary);
  border-radius: var(--radius-2xl);
  box-shadow: var(--shadow-lg);
}

.setup-card h2 {
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.03em;
  margin-bottom: var(--space-3);
}

.setup-card p {
  color: var(--text-secondary);
  margin-bottom: var(--space-5);
  font-size: var(--text-sm);
  line-height: var(--leading-normal);
}

.setup-card .btn-primary {
  margin-top: var(--space-5);
  width: 100%;
}

.setup-card input {
  display: block;
  width: 100%;
  padding: var(--space-3) var(--space-4);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  background-color: var(--bg-tertiary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  outline: none;
  transition: border-color var(--duration-normal) var(--ease-out),
              box-shadow var(--duration-normal) var(--ease-out);
}

.setup-card input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-muted);
}

.setup-card input::placeholder {
  color: var(--text-tertiary);
}

/* ==========================================================================
   BUTTONS
   ========================================================================== */

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-3) var(--space-5);
  background-color: var(--accent);
  color: #FFFFFF;
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  min-height: var(--space-12);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background-color var(--duration-fast) var(--ease-out),
              transform var(--duration-fast) var(--ease-out),
              box-shadow var(--duration-fast) var(--ease-out);
  -webkit-tap-highlight-color: transparent;
}

.btn-primary:active {
  background-color: var(--accent-hover);
  transform: scale(0.97);
  box-shadow: var(--shadow-xs);
}

@media (hover: hover) {
  .btn-primary:hover {
    background-color: var(--accent-hover);
    box-shadow: var(--shadow-md);
  }
}

/* ==========================================================================
   ANIMATIONS
   ========================================================================== */

@keyframes tabSlideIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(4px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

@keyframes dotPop {
  0% {
    transform: translateX(-50%) scale(0);
  }
  60% {
    transform: translateX(-50%) scale(1.4);
  }
  100% {
    transform: translateX(-50%) scale(1);
  }
}

@keyframes cardCascade {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes setCompletePulse {
  0% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.4);
  }
  50% {
    transform: scale(1.15);
    box-shadow: 0 0 0 8px rgba(5, 150, 105, 0);
  }
  100% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(5, 150, 105, 0);
  }
}

@keyframes nowPulse {
  0%, 100% {
    opacity: 1;
  }
  50% {
    opacity: 0.6;
  }
}

@keyframes progressFill {
  from {
    width: 0;
  }
}

@keyframes shimmer {
  0% {
    background-position: -200% 0;
  }
  100% {
    background-position: 200% 0;
  }
}

@keyframes bannerGlow {
  0%, 100% {
    opacity: 0.8;
  }
  50% {
    opacity: 1;
  }
}

/* ==========================================================================
   RESPONSIVE
   ========================================================================== */

@media (min-width: 700px) {
  #main {
    max-width: 520px;
    margin: 0 auto;
  }
}

/* ==========================================================================
   TODAY TAB
   ========================================================================== */

.today-header {
  padding: var(--space-4) var(--space-2) var(--space-5);
}

.today-header h2 {
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.03em;
  line-height: var(--leading-tight);
}

.day-meta {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  margin-top: var(--space-2);
  letter-spacing: 0;
}

.workout-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
  padding: 0 var(--space-1);
}

/* --- Workout Card --- */

.workout-card {
  background-color: var(--bg-secondary);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  border: 1px solid var(--border-subtle);
  transition: transform var(--duration-normal) var(--ease-out),
              box-shadow var(--duration-normal) var(--ease-out),
              opacity var(--duration-normal) var(--ease-out),
              border-color var(--duration-normal) var(--ease-out);
  animation: cardCascade var(--duration-slow) var(--ease-out) both;
  animation-delay: calc(var(--i, 0) * 40ms);
}

.workout-card.is-current {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent-soft);
}

.workout-card.is-done {
  opacity: 0.5;
}

.workout-card.is-pending {
  opacity: 0.65;
}

@media (hover: hover) {
  .workout-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }
  .workout-card.is-done:hover,
  .workout-card.is-pending:hover {
    opacity: 0.85;
  }
}

.workout-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-2);
}

.workout-name {
  font-size: var(--text-base);
  font-weight: var(--weight-bold);
  color: var(--text-primary);
  cursor: pointer;
  letter-spacing: -0.02em;
  transition: color var(--duration-fast) var(--ease-out);
}

.workout-name:active {
  color: var(--accent);
}

@media (hover: hover) {
  .workout-name:hover {
    color: var(--accent);
  }
}

/* NOW badge — pulse animation */
.now-badge {
  font-size: 10px;
  font-weight: var(--weight-bold);
  color: var(--accent);
  background-color: var(--accent-soft);
  padding: 3px 10px;
  border-radius: var(--radius-full);
  letter-spacing: 0.06em;
  animation: nowPulse 2.5s ease-in-out infinite;
}

.done-badge {
  font-size: 10px;
  font-weight: var(--weight-bold);
  color: var(--success);
  background-color: var(--success-soft);
  padding: 3px 10px;
  border-radius: var(--radius-full);
  letter-spacing: 0.06em;
}

.workout-meta {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  margin-bottom: var(--space-4);
  font-variant-numeric: tabular-nums;
}

/* --- Set Indicators (larger, 32px) --- */

.set-indicators {
  display: flex;
  gap: var(--space-2);
  align-items: center;
  margin-bottom: var(--space-4);
}

.set-dot {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-full);
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  font-variant-numeric: tabular-nums;
  color: var(--text-tertiary);
  transition: background-color var(--duration-normal) var(--ease-out),
              border-color var(--duration-normal) var(--ease-out),
              color var(--duration-normal) var(--ease-out),
              transform var(--duration-normal) var(--ease-spring);
}

.set-dot.done {
  background-color: var(--success);
  border-color: var(--success);
  color: #FFFFFF;
  animation: setCompletePulse 0.5s var(--ease-out);
}

.set-progress-text {
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  color: var(--text-tertiary);
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}

/* --- Complete Button --- */

.btn-complete {
  width: 100%;
  padding: var(--space-4) var(--space-5);
  border: none;
  border-radius: var(--radius-md);
  background-color: var(--accent);
  color: #FFFFFF;
  font-size: var(--text-base);
  font-weight: var(--weight-bold);
  cursor: pointer;
  min-height: var(--space-12);
  font-family: var(--font-sans);
  letter-spacing: -0.01em;
  transition: background-color var(--duration-fast) var(--ease-out),
              transform var(--duration-fast) var(--ease-out),
              box-shadow var(--duration-fast) var(--ease-out);
  -webkit-tap-highlight-color: transparent;
}

.btn-complete:active {
  transform: scale(0.97);
  box-shadow: var(--shadow-xs);
  background-color: var(--accent-hover);
}

.btn-complete:disabled {
  background-color: var(--bg-tertiary);
  color: var(--text-tertiary);
  cursor: default;
  box-shadow: none;
}

.btn-complete.all-done {
  background: linear-gradient(135deg, var(--success) 0%, #10B981 100%);
}

@media (hover: hover) {
  .btn-complete:not(:disabled):hover {
    background-color: var(--accent-hover);
    box-shadow: var(--shadow-md);
  }
}

/* --- Note Input --- */

.note-input {
  width: 100%;
  margin-top: var(--space-3);
  padding: var(--space-3) var(--space-4);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  background-color: var(--bg-tertiary);
  color: var(--text-primary);
  font-size: var(--text-sm);
  font-family: var(--font-sans);
  resize: none;
  transition: border-color var(--duration-normal) var(--ease-out),
              box-shadow var(--duration-normal) var(--ease-out);
}

.note-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-muted);
  outline: none;
}

.note-input::placeholder {
  color: var(--text-tertiary);
}

/* --- Rest Day --- */

.rest-day {
  text-align: center;
  padding: var(--space-16) var(--space-8);
  color: var(--text-secondary);
}

.rest-day-icon {
  display: block;
  font-size: 3.5rem;
  margin-bottom: var(--space-5);
  line-height: 1;
}

.rest-day h2 {
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.03em;
  margin-bottom: var(--space-3);
  color: var(--text-primary);
}

.rest-day p {
  font-size: var(--text-base);

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>기록</span>
    </button>
    <!-- guide: book-open icon -->
    <button class="tab-btn" data-tab="guide">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      <span>가이드</span>
    </button>
  </nav>

</div>

<!-- ======================================================================
     JAVASCRIPT
     ====================================================================== -->
<script>
/* ==========================================================================
   STATE
   ========================================================================== */

const state = {
  exercises: [],
  todayProgram: [],
  config: {},
  logs: [],
  programs: [],
  today: '',
  activeTab: 'today',
  sessionProgress: {},
  exerciseMap: {},
  guideFilter: '전체',
  guideScrollTo: null,
  recordsMonth: null,
  recordsDate: null
};

/* ==========================================================================
   API CLIENT
   ========================================================================== */

const API_URL = localStorage.getItem('sheets_url') || 'https://script.google.com/macros/s/AKfycby_0_keb2239-sOTSJTZXhXFW-7tgX6fa9_QrXI20zRxPTQ4Ht19yPi5qnteG8FMk2-/exec';

const api = {
  async init() {
    const res = await fetch(API_URL + '?action=init');
    return res.json();
  },
  async getPrograms(month) {
    const res = await fetch(API_URL + '?action=programs&month=' + month);
    return res.json();
  },
  async getLogs(month) {
    const res = await fetch(API_URL + '?action=logs&month=' + month);
    return res.json();
  },
  async getExercises() {
    const res = await fetch(API_URL + '?action=exercises');
    return res.json();
  },
  async postLog(data) {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'log', ...data })
    });
    return res.json();
  },
  async postConfig(key, value) {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'config', key, value })
    });
    return res.json();
  }
};

/* ==========================================================================
   TAB ROUTER
   ========================================================================== */

function switchTab(tabName) {
  state.activeTab = tabName;
  document.querySelectorAll('.tab-content').forEach(function(el) {
    el.classList.remove('active');
  });
  document.querySelectorAll('.tab-btn').forEach(function(el) {
    el.classList.remove('active');
  });
  document.getElementById('tab-' + tabName).classList.add('active');
  document.querySelector('[data-tab="' + tabName + '"]').classList.add('active');
  window.location.hash = '/' + tabName;
  renderTab(tabName);
}

document.getElementById('tab-bar').addEventListener('click', function(e) {
  var btn = e.target.closest('.tab-btn');
  if (btn) switchTab(btn.dataset.tab);
});

function handleHash() {
  var hash = window.location.hash.replace('#/', '') || 'today';
  if (['today', 'curriculum', 'records', 'guide'].includes(hash)) {
    switchTab(hash);
  }
}

window.addEventListener('hashchange', handleHash);

function renderTab(name) {
  switch (name) {
    case 'today': renderToday(); break;
    case 'curriculum': renderCurriculum(); break;
    case 'records': renderRecords(); break;
    case 'guide': renderGuide(); break;
  }
}

/* ==========================================================================
   RENDERERS
   ========================================================================== */

function renderToday() {
  var container = document.getElementById('tab-today');
  var program = state.todayProgram;

  // Rest day check
  if (!program || program.length === 0) {
    container.innerHTML = '<div class="rest-day"><span class="rest-day-icon">&#127769;</span><h2>오늘은 휴식일</h2><p>충분히 쉬세요. 회복도 성장의 일부입니다.</p></div>';
    return;
  }

  var dayLabel = program[0].day_label || '';
  var dateStr = formatDateKR(state.today);

  // All done check
  var allDone = program.every(function(p) {
    var prog = state.sessionProgress[p.exercise_id];
    return prog && prog.every(Boolean);
  });

  var html = '<div class="today-header"><h2>' + dayLabel + '</h2>';
  html += '<div class="day-meta">Level ' + (state.config.current_level || 1) + ' · ' + dateStr + '</div></div>';

  if (allDone) {
    html += '<div class="complete-banner"><h3>오늘 운동 완료!</h3><p>수고했어요. 기록이 저장되었습니다.</p></div>';
  }

  html += '<div class="workout-list">';

  // Find current exercise (first with incomplete sets)
  var currentIdx = program.findIndex(function(p) {
    var prog = state.sessionProgress[p.exercise_id];
    return prog && prog.some(function(s) { return !s; });
  });

  program.forEach(function(p, idx) {
    var ex = state.exerciseMap[p.exercise_id] || {};
    var progress = state.sessionProgress[p.exercise_id] || [];
    var doneCount = progress.filter(Boolean).length;
    var totalSets = progress.length;
    var isDone = doneCount === totalSets;
    var isCurrent = idx === currentIdx;
    var statusClass = isDone ? 'is-done' : isCurrent ? 'is-current' : 'is-pending';

    html += '<div class="workout-card ' + statusClass + '" style="--i:' + idx + '">';
    html += '<div class="workout-card-header">';
    html += '<span class="workout-name" onclick="navigateToGuide(\'' + p.exercise_id + '\')">' + (idx + 1) + '. ' + (ex.name || p.exercise_id) + '</span>';
    if (isCurrent) html += '<span class="now-badge">NOW</span>';
    if (isDone) html += '<span class="done-badge">DONE</span>';
    html += '</div>';
    html += '<div class="workout-meta">' + p.sets + '×' + p.reps + ' · ' + (ex.muscles_primary || '') + '</div>';

    // Set indicators
    html += '<div class="set-indicators">';
    progress.forEach(function(done, si) {
      html += '<div class="set-dot ' + (done ? 'done' : '') + '">' + (done ? '✓' : (si + 1)) + '</div>';
    });
    html += '<span class="set-progress-text">' + doneCount + '/' + totalSets + '</span></div>';

    // Complete button + note (only for current exercise)
    if (isCurrent) {
      html += '<button class="btn-complete" onclick="completeSet(\'' + p.exercise_id + '\')">세트 ' + (doneCount + 1) + ' 완료</button>';
      html += '<textarea class="note-input" placeholder="메모 (선택)" rows="1" id="note-' + p.exercise_id + '"></textarea>';
    }

    // Inline guide (collapsible) // 2026-04-07
    html += '<div class="inline-guide-toggle" onclick="toggleInlineGuide(\'' + p.exercise_id + '-today\')">';
    html += '<span>가이드 보기</span><span class="chevron">▼</span></div>';
    html += '<div class="inline-guide-body" id="guide-inline-' + p.exercise_id + '-today">';
    if (ex.form_guide) {
      html += '<div class="inline-guide-section"><div class="inline-guide-label">폼 가이드</div>';
      html += '<ul>' + ex.form_guide.split('\n').filter(Boolean).map(function(l) { return '<li>' + l.trim() + '</li>'; }).join('') + '</ul></div>';
    }
    if (ex.common_mistakes) {
      html += '<div class="inline-guide-section"><div class="inline-guide-label">흔한 실수</div>';
      html += '<ul>' + ex.common_mistakes.split('\n').filter(Boolean).map(function(l) { return '<li>' + l.trim() + '</li>'; }).join('') + '</ul></div>';
    }
    if (ex.safety_notes) {
      html += '<div class="inline-guide-section"><div class="inline-guide-label">안전 주의</div>';
      html += '<ul>' + ex.safety_notes.split('\n').filter(Boolean).map(function(l) { return '<li>' + l.trim() + '</li>'; }).join('') + '</ul></div>';
    }
    if (ex.video_url) {
      html += '<a href="' + ex.video_url + '" target="_blank" rel="noopener noreferrer" class="inline-guide-video">&#9654; 영상 보기</a>';
    }
    html += '</div>';

    html += '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

// # 2026-04-04
async function completeSet(exerciseId) {
  var progress = state.sessionProgress[exerciseId];
  var setIdx = progress.findIndex(function(s) { return !s; });
  if (setIdx === -1) return;

  progress[setIdx] = true;

  var noteEl = document.getElementById('note-' + exerciseId);
  var note = noteEl ? noteEl.value.trim() : '';

  // POST to Sheets (fire and forget, don't block UI)
  api.postLog({
    date: state.today,
    exercise_id: exerciseId,
    set_number: setIdx + 1,
    reps_done: (state.todayProgram.find(function(p) { return p.exercise_id === exerciseId; }) || {}).reps || '',
    note: note
  }).catch(function(err) { console.error('Log post failed:', err); });

  renderToday();
}

// # 2026-04-04
function navigateToGuide(exerciseId) {
  state.guideScrollTo = exerciseId;
  switchTab('guide');
}

// 2026-04-07 — inline guide toggle for Today + Curriculum tabs
function toggleInlineGuide(key) {
  var el = document.getElementById('guide-inline-' + key);
  if (el) el.classList.toggle('open');
}

// # 2026-04-04
function renderCurriculum() {
  var container = document.getElementById('tab-curriculum');
  var currentLevel = Number(state.config.current_level) || 1;

  // Group exercises by level
  var levelGroups = {};
  (state.exercises || []).forEach(function(ex) {
    var lv = Number(ex.level) || 1;
    if (!levelGroups[lv]) levelGroups[lv] = [];
    levelGroups[lv].push(ex);
  });

  var levelNames = { 1: '기초 체력', 2: '기본 근력', 3: '중급', 4: '상급', 5: '고급' };
  var catOrder = ['push', 'pull', 'legs', 'core', 'swing'];

  var html = '<div class="curriculum-header"><h2>커리큘럼</h2>';
  html += '<div class="day-meta">현재 Level ' + currentLevel + ' · ' + (levelNames[currentLevel] || '') + '</div></div>';
  html += '<div class="level-list">';

  for (var lv = 1; lv <= 5; lv++) {
    var isCurrent = lv === currentLevel;
    var isLocked = lv > currentLevel;
    var isCompleted = lv < currentLevel;

    var statusClass = isCurrent ? ' is-current' : isLocked ? ' is-locked' : '';
    var openClass = isCurrent ? ' open' : '';
    var badgeClass = isCurrent ? 'current' : isLocked ? 'locked' : 'completed';
    var badgeLabel = isCurrent ? '진행중' : isLocked ? '잠금' : '완료';

    html += '<div class="level-card' + statusClass + openClass + '" id="level-' + lv + '" style="--i:' + (lv - 1) + '">';

    // Card header
    html += '<div class="level-card-header" onclick="toggleLevelCard(' + lv + ')">';
    html += '<span class="level-title">Level ' + lv + ' — ' + (levelNames[lv] || '') + '</span>';
    html += '<span class="level-badge ' + badgeClass + '">' + badgeLabel + '</span>';
    html += '</div>';

    // Card body
    html += '<div class="level-card-body">';
    html += '<div class="level-exercises">';

    var exercises = levelGroups[lv] || [];
    // Sort by category order
    exercises.sort(function(a, b) {
      var ai = catOrder.indexOf(a.category);
      var bi = catOrder.indexOf(b.category);
      if (ai === -1) ai = catOrder.length;
      if (bi === -1) bi = catOrder.length;
      return ai - bi;
    });

    exercises.forEach(function(ex) {
      html += '<div class="level-exercise-item">';
      html += '<div class="level-exercise-row" onclick="toggleInlineGuide(\'' + ex.id + '-cur\')">';
      html += '<span class="level-exercise-cat">' + (ex.category || '') + '</span>';
      html += '<span class="level-exercise-name">' + (ex.name || ex.id) + '</span>';
      html += '<span class="chevron" style="font-size:10px;color:var(--text-tertiary)">▼</span>';
      html += '</div>';
      // Inline guide (collapsible) // 2026-04-07
      html += '<div class="inline-guide-body" id="guide-inline-' + ex.id + '-cur">';
      html += '<div class="inline-guide-meta">' + (ex.equipment || '맨몸') + ' · ' + (ex.muscles_primary || '') + '</div>';
      if (ex.form_guide) {
        html += '<div class="inline-guide-section"><div class="inline-guide-label">폼 가이드</div>';
        html += '<ul>' + ex.form_guide.split('\n').filter(Boolean).map(function(l) { return '<li>' + l.trim() + '</li>'; }).join('') + '</ul></div>';
      }
      if (ex.video_url) {
        html += '<a href="' + ex.video_url + '" target="_blank" rel="noopener noreferrer" class="inline-guide-video">&#9654; 영상 보기</a>';
      }
      html += '</div>';
      html += '</div>';
    });

    html += '</div>'; // .level-exercises

    // Progress bar for current level
    if (isCurrent) {
      var pct = calculateLevelProgress(lv);
      html += '<div class="progress-bar-container">';
      html += '<div class="progress-bar-label">진행도 ' + pct + '%</div>';
      html += '<div class="progress-bar"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>';
      html += '</div>';

      // Promotion box if >= 80%
      if (pct >= 80) {
        html += '<div class="promotion-box">';
        html += '<p>진급 준비가 되었을 수 있어요!</p>';
        html += '<button class="btn-levelup" onclick="levelUp()">Level ' + (lv + 1) + ' 진급</button>';
        html += '</div>';
      }
    }

    html += '</div>'; // .level-card-body
    html += '</div>'; // .level-card
  }

  html += '</div>'; // .level-list
  container.innerHTML = html;
}

// # 2026-04-04
function calculateLevelProgress(level) {
  var levelExercises = state.exercises.filter(function(ex) { return Number(ex.level) === level; });
  if (levelExercises.length === 0) return 0;
  var completed = 0;
  levelExercises.forEach(function(ex) {
    var logs = (state.logs || []).filter(function(l) { return l.exercise_id === ex.id; });
    var sessions = new Set(logs.map(function(l) { return l.date; })).size;
    if (sessions >= 3) completed++;
  });
  return Math.round((completed / levelExercises.length) * 100);
}

// # 2026-04-04
async function levelUp() {
  var currentLevel = Number(state.config.current_level) || 1;
  var newLevel = currentLevel + 1;
  if (newLevel > 5) return;
  if (!confirm('Level ' + newLevel + '로 진급하시겠습니까?')) return;
  await api.postConfig('current_level', String(newLevel));
  state.config.current_level = String(newLevel);
  renderCurriculum();
}

// # 2026-04-04
function toggleLevelCard(lv) {
  var card = document.getElementById('level-' + lv);
  if (card) card.classList.toggle('open');
}

// # 2026-04-04
function renderRecords() {
  var container = document.getElementById('tab-records');

  // Initialize state defaults
  if (!state.recordsMonth) state.recordsMonth = state.today.substring(0, 7);
  if (!state.recordsDate) state.recordsDate = state.today;

  var parts = state.recordsMonth.split('-').map(Number);
  var year = parts[0];
  var month = parts[1];

  var monthLabel = year + '년 ' + month + '월';

  var html = '<div class="records-header">';
  html += '<h2>' + monthLabel + '</h2>';
  html += '<div class="month-nav">';
  html += '<button onclick="changeMonth(-1)">&#8249;</button>';
  html += '<span>' + monthLabel + '</span>';
  html += '<button onclick="changeMonth(1)">&#8250;</button>';
  html += '</div>';
  html += '</div>';

  html += renderMiniCalendar(year, month);
  html += renderJournal(state.recordsDate);

  container.innerHTML = html;
}

// # 2026-04-04
function renderMiniCalendar(year, month) {
  var dayNames = ['일', '월', '화', '수', '목', '금', '토'];
  var firstDay = new Date(year, month - 1, 1).getDay();
  var daysInMonth = new Date(year, month, 0).getDate();

  var datesWithLogs = new Set((state.logs || []).map(function(l) { return l.date; }));

  var html = '<div class="mini-calendar">';

  // Day name header row
  dayNames.forEach(function(d) {
    html += '<div class="day-name">' + d + '</div>';
  });

  // Empty cells before first day
  for (var e = 0; e < firstDay; e++) {
    html += '<div class="day-cell empty"></div>';
  }

  // Day cells
  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = year + '-' + String(month).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    var classes = ['day-cell'];
    if (dateStr === state.today) classes.push('today');
    if (dateStr === state.recordsDate) classes.push('selected');
    if (datesWithLogs.has(dateStr)) classes.push('has-workout');

    html += '<div class="' + classes.join(' ') + '" onclick="selectDate(\'' + dateStr + '\')">' + d + '</div>';
  }

  html += '</div>';
  return html;
}

// # 2026-04-04
function renderJournal(dateStr) {
  var html = '<div class="journal-section">';
  html += '<div class="journal-date">' + (dateStr ? formatDateKR(dateStr) : '') + '</div>';

  var dayLogs = (state.logs || []).filter(function(l) { return l.date === dateStr; });

  if (dayLogs.length === 0) {
    html += '<div class="journal-empty">이 날의 기록이 없습니다.</div>';
    html += '</div>';
    return html;
  }

  // Find day_label from programs
  var dayPrograms = (state.programs || []).filter(function(p) { return p.date === dateStr; });
  if (dayPrograms.length > 0 && dayPrograms[0].day_label) {
    html += '<div class="journal-day-label">' + dayPrograms[0].day_label + '</div>';
  }

  // Group logs by exercise_id
  var grouped = {};
  dayLogs.forEach(function(l) {
    if (!grouped[l.exercise_id]) grouped[l.exercise_id] = [];
    grouped[l.exercise_id].push(l);
  });

  // Build planned reps lookup: { exercise_id: reps }
  var plannedReps = {};
  dayPrograms.forEach(function(p) {
    plannedReps[p.exercise_id] = p.reps;
  });

  var totalVolume = 0;

  Object.keys(grouped).forEach(function(exId) {
    var sets = grouped[exId];
    var ex = state.exerciseMap[exId] || {};
    var exName = ex.name || exId;
    var planned = plannedReps[exId];

    html += '<div class="journal-exercise">';
    html += '<div class="journal-exercise-name">' + exName + '</div>';

    sets.forEach(function(s, i) {
      var repsDone = s.reps_done || '-';
      var repNum = parseInt(repsDone, 10);
      if (!isNaN(repNum)) totalVolume += repNum;

      var setLabel = '세트 ' + (s.set_number || (i + 1));
      var repsLabel = repsDone + '회';
      if (planned) repsLabel += ' <span class="text-muted">(목표: ' + planned + ')</span>';

      html += '<div class="journal-set-row"><span>' + setLabel + '</span><span>' + repsLabel + '</span></div>';

      if (s.note) {
        html += '<div class="journal-note">' + s.note + '</div>';
      }
    });

    html += '</div>';
  });

  // Summary
  var exerciseCount = Object.keys(grouped).length;
  var setCount = dayLogs.length;
  html += '<div class="journal-summary">';
  html += exerciseCount + '종목 · ' + setCount + '세트 · 총 ' + totalVolume + '회';
  html += '</div>';

  html += '</div>';
  return html;
}

// # 2026-04-04
async function changeMonth(delta) {
  var parts = state.recordsMonth.split('-').map(Number);
  var newMonth = parts[1] + delta;
  var newYear = parts[0];
  if (newMonth < 1) { newMonth = 12; newYear--; }
  if (newMonth > 12) { newMonth = 1; newYear++; }
  state.recordsMonth = newYear + '-' + String(newMonth).padStart(2, '0');
  state.recordsDate = null;
  try {
    var data = await api.getLogs(state.recordsMonth);
    if (data.logs) state.logs = data.logs;
    var pData = await api.getPrograms(state.recordsMonth);
    if (pData.programs) state.programs = pData.programs;
  } catch (err) { console.error('Failed to fetch month data:', err); }
  renderRecords();
}

// # 2026-04-04
function selectDate(dateStr) {
  state.recordsDate = dateStr;
  renderRecords();
}

// # 2026-04-04
function renderGuide() {
  var container = document.getElementById('tab-guide');
  var categories = [
    { key: '전체', label: '전체' },
    { key: 'push', label: 'Push' },
    { key: 'pull', label: 'Pull' },
    { key: 'legs', label: 'Legs' },
    { key: 'core', label: 'Core' },
    { key: 'swing', label: 'Swing' }
  ];

  // Filter exercises
  var filter = state.guideFilter || '전체';
  var exercises = state.exercises || [];
  var filtered = filter === '전체'
    ? exercises
    : exercises.filter(function(ex) { return ex.category === filter; });

  // Filter chips
  var html = '<div class="guide-filters">';
  categories.forEach(function(cat) {
    var isActive = filter === cat.key;
    html += '<button class="filter-chip' + (isActive ? ' active' : '') + '" onclick="setGuideFilter(\'' + cat.key + '\')">' + cat.label + '</button>';
  });
  html += '</div>';

  // Exercise accordion list
  html += '<div class="guide-list">';
  filtered.forEach(function(ex, idx) {
    html += '<div class="guide-card" id="guide-' + ex.id + '" style="--i:' + idx + '">';

    // Header
    html += '<div class="guide-card-header" onclick="toggleGuideCard(\'' + ex.id + '\')">';
    html += '<div>';
    html += '<h3>' + (ex.name || ex.id) + '</h3>';
    html += '<div class="guide-card-tags">';
    if (ex.level) html += '<span class="guide-tag">Lv.' + ex.level + '</span>';
    if (ex.category) html += '<span class="guide-tag">' + ex.category + '</span>';
    if (ex.equipment) html += '<span class="guide-tag">' + ex.equipment + '</span>';
    html += '</div>';
    html += '</div>';
    // Chevron SVG
    html += '<svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
    html += '</div>';

    // Body (hidden by default)
    html += '<div class="guide-card-body">';

    // Muscles
    if (ex.muscles_primary || ex.muscles_secondary) {
      html += '<div class="guide-section">';
      html += '<div class="guide-section-title">주동근 / 보조근</div>';
      if (ex.muscles_primary) html += '<p>주동근: ' + ex.muscles_primary + '</p>';
      if (ex.muscles_secondary) html += '<p>보조근: ' + ex.muscles_secondary + '</p>';
      html += '</div>';
    }

    // Form guide
    if (ex.form_guide) {
      html += '<div class="guide-section">';
      html += '<div class="guide-section-title">폼 가이드</div>';
      html += '<ul>';
      ex.form_guide.split('\n').forEach(function(line) {
        var t = line.trim();
        if (t) html += '<li>' + t + '</li>';
      });
      html += '</ul></div>';
    }

    // Common mistakes
    if (ex.common_mistakes) {
      html += '<div class="guide-section">';
      html += '<div class="guide-section-title">흔한 실수</div>';
      html += '<ul>';
      ex.common_mistakes.split('\n').forEach(function(line) {
        var t = line.trim();
        if (t) html += '<li>' + t + '</li>';
      });
      html += '</ul></div>';
    }

    // Safety notes
    if (ex.safety_notes) {
      html += '<div class="guide-section">';
      html += '<div class="guide-section-title">안전 주의</div>';
      html += '<ul>';
      ex.safety_notes.split('\n').forEach(function(line) {
        var t = line.trim();
        if (t) html += '<li>' + t + '</li>';
      });
      html += '</ul></div>';
    }

    // Progression chain
    html += renderProgressionChain(ex);

    // Video link
    if (ex.video_url) {
      html += '<div class="guide-section">';
      html += '<a href="' + ex.video_url + '" target="_blank" rel="noopener noreferrer" class="guide-video-link">&#9654; 영상 보기</a>';
      html += '</div>';
    }

    html += '</div>'; // .guide-card-body
    html += '</div>'; // .guide-card
  });

  html += '</div>'; // .guide-list
  container.innerHTML = html;

  // Handle guideScrollTo — open card and scroll
  if (state.guideScrollTo) {
    var targetId = state.guideScrollTo;
    state.guideScrollTo = null;
    var card = document.getElementById('guide-' + targetId);
    if (card) {
      card.classList.add('open');
      setTimeout(function() {
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
    }
  }
}

function setGuideFilter(cat) {
  state.guideFilter = cat;
  renderGuide();
}

// # 2026-04-04
function toggleGuideCard(id) {
  var card = document.getElementById('guide-' + id);
  if (card) card.classList.toggle('open');
}

// # 2026-04-04
function renderProgressionChain(ex) {
  // Walk backward to find chain start
  var start = ex;
  while (start.progression_from && state.exerciseMap[start.progression_from]) {
    start = state.exerciseMap[start.progression_from];
  }
  // Walk forward to build chain
  var chain = [];
  var current = start;
  while (current) {
    chain.push(current);
    current = current.progression_to ? state.exerciseMap[current.progression_to] : null;
  }
  if (chain.length <= 1) return '';

  var html = '<div class="guide-section"><div class="guide-section-title">프로그레션</div>';
  html += '<div class="guide-progression">';
  chain.forEach(function(c, i) {
    if (i > 0) html += '<span class="arrow">&rarr;</span>';
    html += '<span class="' + (c.id === ex.id ? 'current' : '') + '">' + c.name + '</span>';
  });
  html += '</div></div>';
  return html;
}

function formatDateKR(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  var days = ['일', '월', '화', '수', '목', '금', '토'];
  return (d.getMonth() + 1) + '월 ' + d.getDate() + '일 ' + days[d.getDay()] + '요일';
}

/* ==========================================================================
   APP INIT
   ========================================================================== */

async function initApp() {
  try {
    if (!API_URL) {
      showSetup();
      return;
    }

    var data = await api.init();
    if (data.error) throw new Error(data.error);

    // Map API response keys to state keys // 2026-04-07 fix
    state.exercises = data.exercises || [];
    state.todayProgram = data.programs || data.todayProgram || [];
    state.config = data.user_config || data.config || {};
    state.today = data.today || '';

    // Build exercise lookup map
    state.exerciseMap = {};
    state.exercises.forEach(function(ex) {
      state.exerciseMap[ex.id] = ex;
    });

    // Initialize session progress for today's program
    state.todayProgram.forEach(function(p) {
      state.sessionProgress[p.exercise_id] = new Array(Number(p.sets)).fill(false);
    });

    // Load full month data
    var month = state.today.substring(0, 7);
    var results = await Promise.all([
      api.getLogs(month),
      api.getPrograms(month)
    ]);
    var logsData = results[0];
    var programsData = results[1];

    if (logsData.logs) state.logs = logsData.logs;
    if (programsData.programs) state.programs = programsData.programs;

    // Show app
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = '';
    handleHash();

  } catch (err) {
    // NOTE: innerHTML used here with static markup + err.message from fetch API.
    // This is a single-user personal tool; data source is trusted (user's own Sheets).
    var el = document.getElementById('loading');
    el.textContent = '';
    var p = document.createElement('p');
    p.className = 'error-msg';
    p.textContent = '연결 실패: ' + err.message;
    el.appendChild(p);
    var btn = document.createElement('button');
    btn.className = 'btn-primary mt-4';
    btn.textContent = '설정';
    btn.onclick = showSetup;
    el.appendChild(btn);
  }
}

function showSetup() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = '';
  var main = document.getElementById('main');
  // Build setup card with DOM API for safety
  main.textContent = '';
  var card = document.createElement('div');
  card.className = 'setup-card';

  var h2 = document.createElement('h2');
  h2.textContent = '초기 설정';
  card.appendChild(h2);

  var desc = document.createElement('p');
  desc.textContent = 'Google Apps Script 웹앱 URL을 입력하세요.';
  card.appendChild(desc);

  var input = document.createElement('input');
  input.type = 'url';
  input.id = 'setup-url';
  input.placeholder = 'https://script.google.com/...';
  card.appendChild(input);

  var btn = document.createElement('button');
  btn.className = 'btn-primary';
  btn.textContent = '저장';
  btn.onclick = saveSetup;
  card.appendChild(btn);

  main.appendChild(card);
}

function saveSetup() {
  var url = document.getElementById('setup-url').value.trim();
  if (url) {
    localStorage.setItem('sheets_url', url);
    location.reload();
  }
}

// Unregister old Service Workers + clear all caches // 2026-04-04
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(r) { r.unregister(); });
  });
  caches.keys().then(function(keys) {
    keys.forEach(function(k) { caches.delete(k); });
  });
}

// Start the app // 2026-04-04
initApp();
